<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c0e"/>
      <stop offset="100%" style="stop-color:#0f1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007acc;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#5865f2;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <circle cx="200" cy="150" r="300" fill="#007acc" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="1050" cy="500" r="250" fill="#5865f2" opacity="0.07" filter="url(#blur2)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Logo box -->
  <rect x="80" y="80" width="72" height="72" rx="18" fill="url(#glow)" stroke="rgba(0,122,204,0.4)" stroke-width="1.5"/>
  <rect x="80" y="80" width="72" height="72" rx="18" fill="#007acc" opacity="0.15"/>
  <text x="116" y="127" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#60b4ff" text-anchor="middle">SC</text>

  <!-- Site name -->
  <text x="170" y="107" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="1">SynthCore</text>
  <text x="170" y="132" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.25)" letter-spacing="0.5">synthcore.dev</text>

  <!-- Main headline -->
  <text x="80" y="270" font-family="Arial Black, Arial, sans-serif" font-size="62" font-weight="900" fill="white" letter-spacing="-2">SynthCore</text>
  <text x="80" y="345" font-family="Arial Black, Arial, sans-serif" font-size="62" font-weight="900" fill="url(#accent)" letter-spacing="-2">Ultimate</text>

  <!-- Version badge -->
  <rect x="80" y="380" width="140" height="34" rx="17" fill="rgba(0,122,204,0.15)" stroke="rgba(0,122,204,0.4)" stroke-width="1"/>
  <circle cx="107" cy="397" r="5" fill="#22c55e"/>
  <text x="120" y="402" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#22c55e">v3.5.0 Stable</text>

  <!-- Subtitle -->
  <text x="80" y="455" font-family="Arial, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.55)">KI-Projekt-Builder für Python, Web-Apps,</text>
  <text x="80" y="485" font-family="Arial, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.55)">APIs &amp; Discord-Bots. Jetzt kostenlos.</text>

  <!-- Right side — feature pills -->
  <rect x="780" y="180" width="180" height="44" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="870" y="207" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">Python</text>

  <rect x="980" y="180" width="160" height="44" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="1060" y="207" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">JavaScript</text>

  <rect x="780" y="242" width="160" height="44" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="860" y="269" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">Discord Bot</text>

  <rect x="958" y="242" width="182" height="44" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="1049" y="269" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">Maven Build</text>

  <rect x="780" y="304" width="150" height="44" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="855" y="331" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">REST API</text>

  <rect x="948" y="304" width="192" height="44" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="1044" y="331" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">Live Preview</text>

  <!-- Download CTA box -->
  <rect x="780" y="390" width="360" height="68" rx="14" fill="#007acc" opacity="0.9"/>
  <text x="960" y="430" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Jetzt herunterladen →</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="80" y="615" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.3)">synthcore.dev</text>
  <text x="600" y="615" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.3)" text-anchor="middle">Made by Blockem13</text>
  <text x="1120" y="615" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.3)" text-anchor="end">© 2026</text>
</svg>
